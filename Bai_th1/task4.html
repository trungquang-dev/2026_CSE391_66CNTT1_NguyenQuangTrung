<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
</head>
<body>
    <!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Employee Form</title>
</head>
<body>

<form>


        <b>Basic info</b>
        <hr>
        <br><br>
        <label for="employee">Employee:</label>
        <input type="text" id ="employee" value ="9" readonly>
        <br><br>

        <label for="lname"> Last name:</label>
        <input type="text" id ="lname" name ="lname"value="Dodsworth" readonly>
        <br><br>

        <label for="fname"></label>First Name:
        <input type="text" id="fname" name="fname" value="Anne">
        <br><br>

        <label for="gender">Gender:</label>
        <input type="radio" id="gender" name="gender"> Male
        <input type="radio" id="gender"name="gender"> Female
        <input type="radio" id ="gender"name="gender"> XXX
        <input type="radio" id ="gender"name="gender"> ZZZ
        <br><br>

        <label for="title">Title</label>
        <input type="text" id="title" name="title" value="Sales Representative">
        <br><br>

        <label for="suffix">Suffix</label>
        <input type="text" id="suffix" name ="suffix"value="Ms.">
        <br><br>

        <label for="birthdate">Birthdate</label>
        <input type="text" id ="birthdate" value="1969-07-02 00:00:00">
        <br><br>

        <label for="hiredate">Hire Date </label>
        <input type="text" id ="hiredate" value="1994-11-15 00:00:00">
        <br><br>

        <label for="ssn">SSN (if applicable):</label>
        <input type="text">
        <br><br>

        <label for="reports">Reports To:</label>
        <select>
            <option value="buchanan">Buchanan</option>
            <option value="fuller">Fuller</option>
            <option value="leverling">Leverling</option>
        </select>
    <br><br>

    <b>Contact info</b>
    <hr>
    <br><br>
        <label for="email">Email</label>
        <input type="email" id ="email" placeholder="name@example.com">
        <br><br>

        <label for="address">Address</label>
        <input type="text" id="address"value="7 Houndstooth Rd.">
        <br><br>

        <label for="city">City</label>
        <input type="text" id="city" value="London">
        <br><br>

        <label for="region">Region</label>
        <input type="text" id="region" name="region" >
        <br><br>

        <label for="code">Code</label>
        <input type="text" id ="code" name="code"value="WG2 7LT">
        <br><br>

        <label for="countries">Country</label>
        <select id="countries" name="countries">
            <option value="rf">Russian Federation</option>
            <option value="us">USA</option>
            <option value="vn">Viet Nam</option>
        </select>
        <br><br>

        <label for="us tel">US Home Phone</label>
        <input type="tel" id="us tel" name="us tel" placeholder="(234)234-2342" pattern="[0-9]{3}-[0-9]{4}">
        <br><br>

        <label for="file">Photo</label>
        <input type="file" id="file" name="file">
    <br><br>
    <b>Optional Info</b>
    <hr>
    <br><br>
    <label for="note">Note</label>
    <textarea id="note" name="note">Lorem ipsum dolor sit amet consectetur 
        adipisicing elit. Dignissimos dolor eum perferendis hic quae ipsa error rem in repellat quaerat consequatur necessitatibus, esse est voluptatem neque cum nulla similique eos.</textarea>
    <br><br>
    <label for="pre_shift">Preferred Shift</label>
    <input type="checkbox" id="case1" name="case1" value="Regular">
    <label for="case1">Regular</label>
    <input type="checkbox" id="case2" name="case2" value="Gravy Yard">
    <label for="case2">Gravy Yard</label>
    <br>
    <label for="active">Active?</label>
    <input type="checkbox" id="active" name="active"value="Active">
    <br>
    <input type ="submit" value="Submit">
    <input type="button" value="Cancelled">

    
</form>

</body>
</html>

</body>
</html>
