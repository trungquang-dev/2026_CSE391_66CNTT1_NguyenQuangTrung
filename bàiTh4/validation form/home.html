<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Đăng Ký</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Đăng Ký Tài Khoản</h1>
        <div class="success-message" id="successMessage">Đăng ký thành công!</div>
        
        <form id="registerForm" novalidate>
            <!-- Họ và tên -->
            <div class="form-group">
                <label for="fullName">Họ và tên *</label>
                <input type="text" id="fullName" name="fullName" placeholder="Nhập họ và tên">
                <div class="error" id="fullNameError"></div>
            </div>
            
            <!-- Email -->
            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" placeholder="name@domain.com">
                <div class="error" id="emailError"></div>
            </div>
            
            <!-- Số điện thoại -->
            <div class="form-group">
                <label for="phone">Số điện thoại *</label>
                <input type="text" id="phone" name="phone" placeholder="0xxxxxxxxx">
                <div class="error" id="phoneError"></div>
            </div>
            
            <!-- Mật khẩu -->
            <div class="form-group">
                <label for="password">Mật khẩu *</label>
                <input type="password" id="password" name="password" placeholder="Tối thiểu 8 ký tự">
                <div class="error" id="passwordError"></div>
            </div>
            
            <!-- Xác nhận mật khẩu -->
            <div class="form-group">
                <label for="confirmPassword">Xác nhận mật khẩu *</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Nhập lại mật khẩu">
                <div class="error" id="confirmPasswordError"></div>
            </div>
            
            <!-- Giới tính -->
            <div class="form-group">
                <label>Giới tính *</label>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="gender" value="male"> Nam
                    </label>
                    <label>
                        <input type="radio" name="gender" value="female"> Nữ
                    </label>
                    <label>
                        <input type="radio" name="gender" value="other"> Khác
                    </label>
                </div>
                <div class="error" id="genderError"></div>
            </div>
            
            <!-- Điều khoản -->
            <div class="form-group">
                <div class="checkbox-group">
                    <label>
                        <input type="checkbox" id="terms" name="terms">
                        Tôi đồng ý với điều khoản dịch vụ *
                    </label>
                </div>
                <div class="error" id="termsError"></div>
            </div>
            

            <button type="submit">Đăng Ký</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
